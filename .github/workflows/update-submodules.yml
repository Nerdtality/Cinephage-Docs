name: Update Submodules

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update Cinephage Submodules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodules to latest
        run: git submodule update --remote --merge

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repos/
          MAIN_SHA=$(git -C repos/cinephage rev-parse --short HEAD)
          DEV_SHA=$(git -C repos/cinephage-dev rev-parse --short HEAD)
          git commit -m "chore: update Cinephage submodules" \
            -m "cinephage (main): ${MAIN_SHA}" \
            -m "cinephage-dev (dev): ${DEV_SHA}"
          git push
